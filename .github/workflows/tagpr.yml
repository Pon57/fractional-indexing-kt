name: tagpr

on:
  push:
    branches: [ "main" ]
  pull_request:
    types: [ "labeled", "unlabeled" ]

jobs:
  tagpr:
    runs-on: ubuntu-24.04
    if: >
      ${{
        github.event_name == 'push'
        || (
          github.event_name == 'pull_request'
          && github.event.sender.type != 'Bot'
          && github.event.action == 'labeled'
          && contains(fromJSON('["major","minor"]'), github.event.label.name)
          && github.event.pull_request.merged == true
        )
        || (
          github.event_name == 'pull_request'
          && github.event.sender.type != 'Bot'
          && contains(fromJSON('["tagpr:major","tagpr:minor"]'), github.event.label.name)
          && startsWith(github.event.pull_request.head.ref, 'tagpr-from-')
        )
      }}
    concurrency:
      group: ${{ github.workflow }}
      cancel-in-progress: true

    steps:
      - name: Generate token
        id: generate_token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.TAGPR_APP_ID }}
          private-key: ${{ secrets.TAGPR_PRIVATE_KEY }}

      - name: Check out code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: "main"
          token: ${{ steps.generate_token.outputs.token }}

      # for update lockfiles
      - name: Set up JDK 21
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: 'zulu'
          java-version: 21
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - uses: Songmu/tagpr@d1b8138b7a31075141b6cd64103de9485ced7ac9 # v1.20.1
        env:
          GITHUB_TOKEN: ${{ steps.generate_token.outputs.token }}
