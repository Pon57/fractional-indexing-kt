name: tagpr

on:
  push:
    branches: [ "main" ]
  pull_request:
    types: [ "labeled", "unlabeled" ]

jobs:
  tagpr:
    runs-on: ubuntu-24.04
    if: >
      ${{
        github.event_name == 'push'
        || (
          github.event_name == 'pull_request'
          && github.event.sender.type != 'Bot'
          && github.event.action == 'labeled'
          && contains(fromJSON('["major","minor"]'), github.event.label.name)
          && github.event.pull_request.merged == true
        )
        || (
          github.event_name == 'pull_request'
          && github.event.sender.type != 'Bot'
          && contains(fromJSON('["tagpr:major","tagpr:minor"]'), github.event.label.name)
          && startsWith(github.event.pull_request.head.ref, 'tagpr-from-')
        )
      }}
    concurrency:
      group: ${{ github.workflow }}
      cancel-in-progress: true

    steps:
      - name: Generate token
        id: generate_token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.TAGPR_APP_ID }}
          private-key: ${{ secrets.TAGPR_PRIVATE_KEY }}

      - name: Check out code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: "main"
          token: ${{ steps.generate_token.outputs.token }}

      # for update lockfiles
      - name: Set up JDK 21
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: 'zulu'
          java-version: 21
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - uses: Songmu/tagpr@e84001bd5dac8defa0c75b3913937d284a3b3660 # v1.20.0
        env:
          GITHUB_TOKEN: ${{ steps.generate_token.outputs.token }}
