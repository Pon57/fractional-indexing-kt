name: Test

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}${{ startsWith(github.head_ref || '', 'tagpr-from-') && format('-{0}', github.run_id) || '' }}
  cancel-in-progress: true

jobs:
  abi-check:
    name: "checkKotlinAbi"
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up JDK 21
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: zulu
          java-version: 21
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Run ABI compatibility check
        run: ./gradlew :library:checkKotlinAbi --no-configuration-cache

  test:
    name: "${{ matrix.os }} / ${{ matrix.target }}"
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: "jvmTest"
          - os: ubuntu-latest
            target: "jsNodeTest"
          - os: ubuntu-latest
            target: "wasmJsNodeTest"
          - os: ubuntu-latest
            target: "testAndroidHostTest"
          - os: macos-latest
            target: "iosSimulatorArm64Test"
          - os: macos-latest
            target: "macosArm64Test"

    steps:
      - name: Check out code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up JDK 21
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: zulu
          java-version: 21
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Run test target
        id: run_tests
        run: |
          set -o pipefail
          if [ "${{ matrix.target }}" = "jvmTest" ]; then
            ./gradlew ${{ matrix.target }} -PrunPerformanceTests=true --no-configuration-cache | tee jvm-test.log
          else
            ./gradlew ${{ matrix.target }} --no-configuration-cache
          fi

      - name: Publish jvm perf profile summary
        if: ${{ always() && matrix.target == 'jvmTest' }}
        run: |
          profile_line="$(
            grep -Rho -m1 'PERF_PROFILE [^<]*' jvm-test.log library/build/test-results/jvmTest 2>/dev/null | head -n1 || true
          )"
          memory_line="$(
            grep -Rho -m1 'PERF_MEMORY [^<]*' jvm-test.log library/build/test-results/jvmTest 2>/dev/null | head -n1 || true
          )"

          {
            echo "## JVM Performance Profile"
            if [ "${{ steps.run_tests.outcome }}" = "success" ]; then
              echo "- Test step result: ✅ Passed"
            else
              echo "- Test step result: ❌ Failed"
            fi
            echo ""
            if [ -n "$profile_line" ]; then
              echo '```text'
              echo "$profile_line"
              echo '```'
            else
              echo "- PERF_PROFILE line not found."
            fi
            echo ""
            if [ -n "$memory_line" ]; then
              echo "### Memory Observation"
              echo '```text'
              echo "$memory_line"
              echo '```'
            else
              echo "### Memory Observation"
              echo "- PERF_MEMORY line not found."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
